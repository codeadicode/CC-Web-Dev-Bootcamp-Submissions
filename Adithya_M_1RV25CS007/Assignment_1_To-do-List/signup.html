<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        body {
            background-color: aquamarine;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: auto;
            height: 100vh;
        }
        h1 {
            text-align: center;
            margin-top: 80px;
            margin-bottom: 60px;
        }
        .signup-container {
            border: 5px solid brown;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: flex-start;
            width: 50vh;
            padding: 20px;
            font-size: 1.5em;
        }
        .signup-container p {
            font-size: 15px;
        }
        input {
            width: 50vh;
            height: 20px;
        }
        button {
            width: 50vh;
            height: 5vh;
            border-radius: 10px;
            cursor: pointer;
            background-color: pink;
            font-size: 15px;
        }
        button:hover {
            transform: scale(1.1);
            background-color: cornflowerblue;
        }
    </style>
</head>
<body>
    <h1>Sign-up - it's free!</h1> <br>
    <form class="signup-container" action="managetasks.html">
        <label for="email">Email or Phone No. <br> <input type="email" required></label> 
        <br>
        <label for="password">Password <br> <input type="password" required></label>
        <br>
        <label for="password">Confirm Password <br> <input type="password" required></label>
        <br>
        <p>By clicking Sign-up, you agree to the webpage's
        User Agreement, Privacy Policy and Cookie Policy.</p> 
        <button>Sign-Up</button> 
        <p>__________________________________</p>
        <p style="padding-left: 15px;">Already have an account? <a href="login.html">Login</a></p>
    </form>
    
    
</body>
</html>
